apiVersion: v1
kind: ServiceAccount
metadata:
  annotations: {}
  labels:
    name: exoscale-csi-node
  name: exoscale-csi-node
  namespace: syn-csi-exoscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations: {}
  labels:
    name: exoscale-csi-node-driver-registrar
  name: exoscale-csi-node-driver-registrar
rules:
  - apiGroups:
      - ''
    resources:
      - events
      - pods
      - nodes
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
